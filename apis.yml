aid: monell-chemical-senses-center
name: Monell Chemical Senses Center
description: >-
  The Monell Chemical Senses Center is "the world's only independent, non-profit
  scientific institute dedicated to interdisciplinary basic research on the
  senses of taste and smell." Founded in 1968 and headquartered in Philadelphia,
  Monell conducts chemosensory research organized around three strategic themes:
  Healthy Senses and Happy Lives, Senses for a Thriving Planet, and Nourishing
  Our Future. The center runs postdoctoral training, the Dr. Charis Eng Monell
  Science Apprenticeship Program, the Monell Science Entrepreneurship Program,
  an Academic Partnership Program, and the Monell Insiders corporate partnership
  program. Monell does not publish a public developer API surface; its "product"
  is knowledge disseminated through scholarly publications and conferences.
